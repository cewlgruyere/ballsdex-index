name: Validate cogs.json

on:
  pull_request:
    paths:
      - "data/cogs.json"

permissions:
  contents: read

jobs:
  validate:
    name: Check cogs.json is valid JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate JSON
        run: python3 -c "import json, sys; json.load(open('data/cogs.json')); print('cogs.json is valid JSON')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install tomli

      - name: Determine changed cogs
        run: python scripts/changed_cog_ids.py "${{ github.event.pull_request.base.sha }}" > changed_cogs.txt

      - name: Check for missing releases
        id: check_releases
        run: |
          python scripts/check_releases.py missing-releases.md changed_cogs.txt || true
          if [ -s missing-releases.md ]; then
            echo "has_missing=true" > has_missing.txt
          else
            echo "has_missing=false" > has_missing.txt
          fi
          echo "${{ github.event.pull_request.number }}" > pr_number.txt

      - name: Upload release check results
        uses: actions/upload-artifact@v4
        with:
          name: release-check-results
          path: |
            missing-releases.md
            has_missing.txt
            pr_number.txt
          retention-days: 1
